
networks:
  vpn:
    driver: bridge

services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - vpn
    ports:
      - "${QBITTORRENT_WEB_PORT}:8085"
      - "6881:6881"
      - "6881:6881/udp"
      - "${PROWLARR_PORT}:9696"
      - "${SONARR_PORT}:8989"
      - "${RADARR_PORT}:7878"
      - "${BAZARR_PORT}:6767"
      - "${TULIPROX_PORT}:8901"
    volumes:
      - ${CONFIG_ROOT}/gluetun:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - SERVER_COUNTRIES=${VPN_COUNTRIES}
      - SERVER_CITIES=${VPN_CITIES}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - TZ=${TZ}
      - FIREWALL=on
      - FIREWALL_OUTBOUND_SUBNETS=${LAN_SUBNETS}
      # Disable DNS block list downloads — they race with VPN startup and add no value here
      - BLOCK_MALICIOUS=off
      - BLOCK_SURVEILLANCE=off
      - BLOCK_ADS=off
      # Give up on unresponsive servers quickly so Gluetun cycles to a new IP faster
      - OPENVPN_FLAGS=--connect-retry-max 2

    healthcheck:
      test: /gluetun-entrypoint healthcheck
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 1
    restart: unless-stopped
